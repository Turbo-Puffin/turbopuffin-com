name: Build and Deploy to Bunny.net

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Bunny.net Storage
        uses: ayeressian/bunnycdn-storage-deploy@v2.2.2
        with:
          source: "dist"
          destination: ""
          storageZoneName: "${{ secrets.BUNNY_STORAGE_ZONE }}"
          storagePassword: "${{ secrets.BUNNY_STORAGE_PASSWORD }}"
          storageEndpoint: "${{ secrets.BUNNY_STORAGE_ENDPOINT }}"
          upload: "true"
          remove: "true"

      - name: Purge Bunny.net CDN cache
        run: |
          curl -X POST \
            -H "AccessKey: ${{ secrets.BUNNY_API_KEY }}" \
            "https://api.bunny.net/pullzone/${{ secrets.BUNNY_PULL_ZONE_ID }}/purgeCache"
